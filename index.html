<head>

  <meta charset="UTF-8">
  <title>Coming Soon</title>

  <!-- tsParticles -->
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
  <link rel="icon" type="image/png" href="item6-img.png">
  <!-- Icons (Font Awesome) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #161616;
      overflow: hidden;
      font-family: sans-serif;
    }
#lottie-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  /*opacity: 0.25;  🔥 controls transparency */
  pointer-events: none;
}
#lottie-bg svg {
  width: 100% !important;
  height: 100% !important;
}
    .coming-soon-container {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
      z-index: 2;
      color: white; /* ensure text is white */
    }

    .coming-soon-logo {
      width: 180px; /* default desktop size */
      height: auto;
      margin-bottom: 30px;
    }

    .coming-soon-title {
      font-size: 3rem; /* default desktop size */
      font-weight: bold;
      margin-bottom: 20px;
      color: white; /* force white */
    }

    .coming-soon-desc {
      color: rgba(255, 255, 255, 0.6);
      font-size: 1rem;
      margin-bottom: 30px;
      max-width: 600px;
    }

    .social-icons {
      display: flex;
      gap: 20px;
    }

    .social-icons a {
      font-size: 28px;
      color: rgba(255, 255, 255, 0.4);
      transition: all 0.2s ease;
    }

    .social-icons a:hover {
      color: #3dfdff; /* colored on hover */
      transform: translateY(-2px);
    }
/* Tablets */
@media (max-width: 1024px) {
  .coming-soon-title {
    font-size: 4rem;
  }
  .coming-soon-desc {
    font-size: 1.3rem;
  }
  .social-icons a {
    font-size: 38px;
  }
}

/* Phones */
@media (max-width: 768px) {
  .coming-soon-logo {
    width: 250px;
  }
  .coming-soon-title {
    font-size: 3.6rem;
  }
  .coming-soon-desc {
    font-size: 1.2rem;
  }
  .social-icons a {
    font-size: 36px;
  }
}

/* Small phones */
@media (max-width: 480px) {
  .coming-soon-title {
    font-size: 3rem;
  }
  .coming-soon-desc {
    font-size: 1.1rem;
  }
  .social-icons a {
    font-size: 32px;
  }
}

  </style>
</head>

<body>

<div id="lottie-bg"></div>

<div class="coming-soon-container">
  <img src="logo.png" alt="Logo" class="coming-soon-logo">
  <h1 class="coming-soon-title">Coming Soon</h1>
  <p class="coming-soon-desc">Nel frattempo, seguici su Instagram e TikTok per restare aggiornatə su tutte le news!</p>
  <div class="social-icons">
      <a href="https://www.instagram.com/miniature3d.it/" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://www.tiktok.com/@miniature3d.it?_r=1&_t=ZN-94mD4dlAv82" target="_blank"><i class="fab fa-tiktok"></i></a>
  </div>
</div>

</body>
</html>
