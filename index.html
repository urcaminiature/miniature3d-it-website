<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Coming Soon</title>

  <!-- tsParticles -->
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

  <!-- Icons (Font Awesome) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #161616;
      overflow: hidden;
      font-family: sans-serif;
    }

    .particles-fullscreen {
      position: relative;
      width: 100%;
      height: 100vh;
    }

    #tsparticles {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }

    .content {
      position: relative;
      z-index: 2;

      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      text-align: center;
      color: white;
    }

    .logo {
      width: 180px;
      margin-bottom: 30px;
    }

    .title {
      font-size: 2.5rem;
      font-weight: bold;
      margin-bottom: 15px;
    }

    /* Your provided style */
    .step-desc {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.9rem;
      font-family: "Courier New", Courier, monospace;
      line-height: 1.3;
      margin-bottom: 25px;
    }

    .social-icons {
      display: flex;
      gap: 20px;
    }

    .social-icons a {
      font-size: 28px;
      color: rgba(255, 255, 255, 0.4);
      transition: all 0.2s ease;
    }

    .social-icons a:hover {
      color: #3dfdff; /* colored on hover */
      transform: translateY(-2px);
    }
  </style>
</head>

<body>

<div class="particles-fullscreen">
  <div id="tsparticles"></div>

  <div class="content">
    <img src="logo.png" alt="Logo" class="logo">

    <div class="title">Coming Soon</div>

    <div class="step-desc">
      Nel frattempo, seguici su Instagram e TikTok per restare aggiornato su tutte le news!
    </div>

    <div class="social-icons">
      <a href="https://www.instagram.com/miniature3d.it/" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://www.tiktok.com/@miniature3d.it?_r=1&_t=ZN-94mD4dlAv82" target="_blank"><i class="fab fa-tiktok"></i></a>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  tsParticles.load("tsparticles", {
    background: {
      color: "#161616"
    },
    fullScreen: {
      enable: false
    },
    particles: {
      number: {
        value: 100,
        density: {
          enable: true,
          area: 800
        }
      },
      color: {
        value: "#3dfdff"
      },
      links: {
        enable: true,
        distance: 200,
        color: "#3dfdff",
        opacity: 0.2,
        width: 1
      },
      move: {
        enable: true,
        speed: 0.3
      },
      size: {
        value: 2
      },
      opacity: {
        value: 0.3
      }
    }
  });
});
</script>

</body>
</html>
